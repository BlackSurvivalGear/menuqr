<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Profile - ScanMenu.Africa</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
    <header>
        <nav class="container">
            <a href="index.html" class="logo">
                <img src="favi.png" alt="ScanMenu.Africa" class="logo-icon">
                <span>ScanMenu.Africa</span>
            </a>
            <button id="logout-btn" class="btn btn-outline btn-small">Logout</button>
        </nav>
    </header>

    <main class="container dashboard-watermark">
        <div class="auth-container" style="min-height: auto; padding-top: 0;">
            <div class="auth-card" style="max-width: 500px;">
                <h2 id="page-title">Restaurant Profile Setup</h2>
                <p id="page-subtitle">Please provide your business details to get started.</p>

                <form id="restaurant-form">
                    <div class="form-group">
                        <label for="businessName">Business Name</label>
                        <input type="text" id="businessName" required placeholder="e.g. The Italian Bistro">
                    </div>
                    <div class="form-group">
                        <label for="ownerName">Owner Name</label>
                        <input type="text" id="ownerName" required placeholder="e.g. John Doe">
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" required placeholder="e.g. +1 234 567 8900">
                    </div>
                    <div class="form-group">
                        <label for="whatsapp">WhatsApp Number</label>
                        <input type="tel" id="whatsapp" required placeholder="e.g. +1 234 567 8900">
                    </div>
                    <div class="form-group">
                        <label for="address">Business Address</label>
                        <textarea id="address" required placeholder="e.g. 123 Main St, City, Country" style="width: 100%; padding: 0.625rem; border: 1px solid var(--border-color); border-radius: 0.375rem; font-size: 1rem; font-family: inherit; resize: vertical; min-height: 100px;"></textarea>
                    </div>

                    <button type="submit" id="submit-btn" class="btn btn-primary btn-full">
                        <span id="btn-text">Save Profile</span>
                        <div id="btn-loader" class="loader hidden"></div>
                    </button>

                    <a href="dashboard.html" id="cancel-btn" class="btn btn-outline btn-full hidden">Cancel</a>
                </form>

                <div id="error-message" class="error-box hidden"></div>
                <div id="success-message" class="success-box hidden" style="background-color: #dcfce7; color: #166534; padding: 0.75rem; border-radius: 0.375rem; font-size: 0.875rem; margin-top: 1rem;">
                    Profile saved successfully! Redirecting...
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="js/restaurant.js"></script>
</body>
</html>
