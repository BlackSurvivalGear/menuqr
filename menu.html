<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu | ScanMenu.Africa</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
    <div id="loading-screen" class="loading-container">
        <div class="loader" style="border-top-color: var(--primary-color); width: 3rem; height: 3rem;"></div>
        <p style="margin-top: 1rem;">Loading Menu...</p>
    </div>

    <div id="menu-layout" class="menu-layout-wrapper hidden">
        <div id="menu-container" class="public-menu">
            <header class="restaurant-header">
                <h1 id="res-name" class="restaurant-name"></h1>
                <p id="res-address" class="restaurant-info"></p>
                <a id="res-whatsapp" href="#" class="whatsapp-link hidden">
                    <span>Message on WhatsApp</span>
                </a>
            </header>

            <main id="menu-content">
                <!-- Menu items will be injected here -->
            </main>

            <footer class="public-footer">
                <p>Powered by ScanMenu.Africa</p>
            </footer>
        </div>

        <!-- Cart Panel (Sticky on Desktop, Drawer on Mobile) -->
        <div id="cart-panel" class="cart-panel hidden"></div>
    </div>

    <!-- Fixed Bottom Summary for Mobile -->
    <div id="mobile-cart-summary" class="cart-summary-fixed hidden"></div>

    <!-- Overlay for Drawer -->
    <div id="drawer-overlay" class="drawer-overlay"></div>

    <div id="error-screen" class="empty-state hidden">
        <h2 id="error-title">Unavailable</h2>
        <p id="error-message">This menu is currently unavailable.</p>
        <div style="margin-top: 2rem;">
            <a href="index.html" class="btn btn-outline">Back to Home</a>
        </div>
    </div>

    <script type="module" src="js/public-menu.js"></script>
</body>
</html>
